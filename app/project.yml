# SPDX-License-Identifier: GPL-3.0-or-later

name: Gokan
options:
  bundleIdPrefix: com.gokan
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
packages:
  GokanPackage:
    path: ..
settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  Gokan-iOS:
    type: application
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Shared
        includes:
          - "**/*.swift"
      - path: iOS
        includes:
          - "**/*.swift"
    dependencies:
      - package: GokanPackage
        product: GokanUI
    settings:
      base:
        PRODUCT_NAME: Gokan
        PRODUCT_BUNDLE_IDENTIFIER: com.gokan.Gokan
        INFOPLIST_FILE: Shared/Info-iOS.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  Gokan-macOS:
    type: application
    platform: macOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Shared
        includes:
          - "**/*.swift"
      - path: macOS
        includes:
          - "**/*.swift"
    dependencies:
      - package: GokanPackage
        product: GokanUI
    settings:
      base:
        PRODUCT_NAME: Gokan
        PRODUCT_BUNDLE_IDENTIFIER: com.gokan.Gokan
        INFOPLIST_FILE: Shared/Info-macOS.plist
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        ENABLE_HARDENED_RUNTIME: "NO"
  Gokan-iOS-UITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: SmokeUITests
        includes:
          - "**/*.swift"
    dependencies:
      - target: Gokan-iOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gokan.Gokan.iOSUITests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: Gokan-iOS
  Gokan-macOS-UITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: SmokeUITests
        includes:
          - "**/*.swift"
    dependencies:
      - target: Gokan-macOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gokan.Gokan.macOSUITests
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        TEST_TARGET_NAME: Gokan-macOS
schemes:
  Gokan-iOS:
    build:
      targets:
        Gokan-iOS: all
        Gokan-iOS-UITests: [test]
    test:
      targets:
        - Gokan-iOS-UITests
  Gokan-macOS:
    build:
      targets:
        Gokan-macOS: all
        Gokan-macOS-UITests: [test]
    test:
      targets:
        - Gokan-macOS-UITests
